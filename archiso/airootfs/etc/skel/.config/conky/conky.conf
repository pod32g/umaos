-- UmaOS Training Stats — Conky Desktop Widget
-- Maps Uma Musume training stats to system metrics:
--   Speed → CPU  |  Stamina → RAM  |  Power → Disk
--   Guts → Network  |  Intelligence → Load

conky.config = {
    alignment = 'top_right',
    gap_x = 24,
    gap_y = 60,
    minimum_width = 200,
    maximum_width = 220,

    -- Appearance
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'override',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 180,
    own_window_colour = '0e1f14',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    -- Borders
    border_inner_margin = 16,
    border_outer_margin = 0,
    draw_borders = false,
    draw_outline = false,
    draw_shades = false,

    -- Fonts & colors
    use_xft = true,
    font = 'Noto Sans:size=9',
    default_color = 'dce8de',
    color1 = '42a54b',    -- UmaOS green
    color2 = 'ff91c0',    -- UmaOS pink
    color3 = '80b088',    -- muted green
    color4 = 'ffffff',    -- white

    -- Update
    update_interval = 2.0,
    double_buffer = true,
    cpu_avg_samples = 2,
    net_avg_samples = 2,
    no_buffers = true,
    text_buffer_size = 2048,
};

conky.text = [[
${color4}${font Noto Sans:bold:size=12}TRAINING STATS${font}${color}
${color1}${hr 1}${color}

${color2}Speed${color}
${color1}${cpubar 6}${color}
${alignr}${cpu}%

${color2}Stamina${color}
${color1}${membar 6}${color}
${alignr}${mem} / ${memmax}

${color2}Power${color}
${color1}${fs_bar 6 /}${color}
${alignr}${fs_used /} / ${fs_size /}

${color2}Guts${color}
${if_up wlan0}${color1}${downspeedgraph wlan0 20,200 42a54b ff91c0 -t}${color}
${alignr}↓${downspeed wlan0}  ↑${upspeed wlan0}${else}${if_up eth0}${color1}${downspeedgraph eth0 20,200 42a54b ff91c0 -t}${color}
${alignr}↓${downspeed eth0}  ↑${upspeed eth0}${else}${if_up enp0s31f6}${color1}${downspeedgraph enp0s31f6 20,200 42a54b ff91c0 -t}${color}
${alignr}↓${downspeed enp0s31f6}  ↑${upspeed enp0s31f6}${else}${color3}No network${endif}${endif}${endif}

${color2}Intelligence${color}
${color3}Load: ${loadavg}
Procs: ${processes} (${running_processes} run)${color}
${color1}${hr 1}${color}
${color3}${font Noto Sans:size=7}Uptime: ${uptime_short}${font}${color}
]];
