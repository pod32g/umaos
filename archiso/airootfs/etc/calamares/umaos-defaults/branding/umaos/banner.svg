<svg xmlns="http://www.w3.org/2000/svg" width="960" height="160" viewBox="0 0 960 160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13301b"/>
      <stop offset="58%" stop-color="#42a54b"/>
      <stop offset="100%" stop-color="#67ca68"/>
    </linearGradient>
    <radialGradient id="shine" cx="82%" cy="62%" r="56%">
      <stop offset="0%" stop-color="#f1c0d8" stop-opacity="0.52"/>
      <stop offset="55%" stop-color="#f1c0d8" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#f1c0d8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mist" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#08140c" stop-opacity="0.46"/>
      <stop offset="36%" stop-color="#08140c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#08140c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="960" height="160" fill="url(#bg)"/>
  <rect width="960" height="160" fill="url(#mist)"/>
  <circle cx="792" cy="106" r="160" fill="url(#shine)"/>

  <text x="480" y="68" text-anchor="middle" fill="#ffffff" font-size="46" font-family="Noto Sans, sans-serif" font-weight="700">
