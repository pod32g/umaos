# UmaOS Calamares settings.
---
modules-search: [ local ]

instances:
- id: preinit
  module: shellprocess
  config: shellprocess-preinit.conf
- id: postboot
  module: shellprocess
  config: shellprocess-postboot.conf

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - locale
  - keyboard
  - localecfg
  - fstab
  - shellprocess@preinit
  - initcpiocfg
  - initcpio
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - services-systemd
  - bootloader
  - shellprocess@postboot
  - umount
- show:
  - finished

branding: umaos
prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true
hide-back-and-next-during-exec: false
quit-at-end: false
