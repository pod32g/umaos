---
# UmaOS finish page configuration
# Shown after successful installation

restartNowEnabled: true
restartNowChecked: true

# Custom completion message matching the UmaOS brand
restartNowCommand: "systemctl -i reboot"

# NOTE: The branding.desc productName/shortProductName controls the text displayed.
# The "All Done!" text and restart checkbox come from Calamares built-in finished module.
