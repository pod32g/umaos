---
# UmaOS Calamares unpack source configuration for ArchISO.
# Without this file, Calamares may fall back to upstream sample config
# (e.g. ../CHANGES), which causes installation failure.
unpack:
  - source: "/run/archiso/bootmnt/arch/x86_64/airootfs.sfs"
    sourcefs: "squashfs"
    destination: ""

  # Kernel artifacts live outside airootfs.sfs in ArchISO.
  # Copy them into target /boot so bootloader configuration is valid.
  - source: "/run/archiso/bootmnt/arch/boot/x86_64/vmlinuz-linux"
    sourcefs: "file"
    destination: "/boot/vmlinuz-linux"

  - source: "/run/archiso/bootmnt/arch/boot/x86_64/initramfs-linux.img"
    sourcefs: "file"
    destination: "/boot/initramfs-linux.img"
