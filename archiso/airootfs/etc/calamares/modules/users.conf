---
defaultGroups:
  - name: users
    must_exist: true
    system: true
  - lp
  - video
  - network
  - storage
  - name: wheel
    must_exist: false
    system: true
  - audio

sudoersGroup: wheel
autologinGroup: autologin
sudoersConfigureWithGroup: true
setRootPassword: true
doReusePassword: true

displayAutologin: true
doAutologin: false

# UmaOS is a hobbyist/gaming distro; relaxed password policy for convenience.
# For security-critical deployments, increase minLength and disable weak passwords.
passwordRequirements:
  minLength: 1
  maxLength: 64

allowWeakPasswords: true
allowWeakPasswordsDefault: true

user:
  shell: /bin/bash
  forbidden_names: [ root ]
  home_permissions: "0700"

hostname:
  location: EtcFile
  writeHostsFile: true
  template: "umaos-${first}"
