#
# /etc/pacman.conf — UmaOS
#
# See the pacman.conf(5) manpage for option and repository directives

[options]
HoldPkg     = pacman glibc
Architecture = auto

# UmaOS cosmetics
Color
ILoveCandy
ParallelDownloads = 5

# Misc options
CheckSpace
VerbosePkgLists
DownloadUser = alpm

SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

# Uncomment to enable multilib (32-bit support for Steam/gaming)
#[multilib]
#Include = /etc/pacman.d/mirrorlist
